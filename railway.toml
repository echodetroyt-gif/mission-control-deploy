[build]
builder = "nixpacks"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"

[variables]
DATABASE_PATH = "/app/mission-control.db"
OPENCLAW_GATEWAY_URL = "ws://localhost:18789"
OPENCLAW_GATEWAY_TOKEN = ""
MODEL_DISCOVERY = "auto"
PLANNING_TIMEOUT_MS = "30000"
PLANNING_POLL_INTERVAL_MS = "2000"
WORKSPACE_BASE_PATH = "/app/workspace"
PROJECTS_PATH = "/app/workspace/projects"
ALLOW_DYNAMIC_AGENTS = "true"
